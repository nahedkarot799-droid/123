        /* Custom premium animations for game elements */
        @keyframes pulse-gold {

            50% { filter: drop-shadow(0 0 16px #FFD700); }

            50% { filter: drop-shadow(0 0 16px #9C27B0); }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }

        .pulse-gold-glow {

        }

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* Custom Synthesizer for Retro Game Sound Effects (No External Files Required!) */
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                } else if (type === 'toggle') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'success') {
                    const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 1046.50]; // C Major chord scale up
                    notes.forEach((freq, idx) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.1);
                        gain.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + idx * 0.1 + 0.3);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + idx * 0.1);
                        osc.stop(ctx.currentTime + idx * 0.1 + 0.3);
                    });
                } else if (type === 'fail') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(110, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'slide') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(350, ctx.currentTime + 0.6);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.6);
                }
            } catch (e) {
                console.warn("AudioContext init failed (User gesture might be required first)", e);
            }
        };

                leaves: [

                leaves: [

                    { id: "L6", color: "purple", x: 66, y: 12 },
                    { id: "L7", color: "gold",  x: 82, y: 12 }, // Initially Gold leaf
                    { id: "L8", color: "purple", x: 94, y: 12 },
                ],
                nests: [
                    { id: "N1", initialColor: "purple", currentColor: "purple", x: 16, y: 34, inputs: ["L1", "L2"] },
                    { id: "N2", initialColor: "purple", currentColor: "purple", x: 40, y: 34, inputs: ["L3", "L4"] },
                    { id: "N3", initialColor: "gold", currentColor: "gold", x: 60, y: 34, inputs: ["L5", "L6"] },
                    { id: "N4", initialColor: "gold", currentColor: "gold", x: 88, y: 34, inputs: ["L7", "L8"] },
                    { id: "N5", initialColor: "gold", currentColor: "gold", x: 28, y: 60, inputs: ["N1", "N2"] },
                    { id: "N6", initialColor: "purple", currentColor: "purple", x: 74, y: 60, inputs: ["N3", "N4"] },
                    { id: "N7", initialColor: "purple", currentColor: "purple", x: 50, y: 80, inputs: ["N5", "N6"] }
                ],
                target: { id: "Target", color: "gold", x: 50, y: 94, input: "N7" },
                connections: [
                    { from: "L1", to: "N1" }, { from: "L2", to: "N1" },
                    { from: "L3", to: "N2" }, { from: "L4", to: "N2" },
                    { from: "L5", to: "N3" }, { from: "L6", to: "N3" },
                    { from: "L7", to: "N4" }, { from: "L8", to: "N4" },
                    { from: "N1", to: "N5" }, { from: "N2", to: "N5" },
                    { from: "N3", to: "N6" }, { from: "N4", to: "N6" },
                    { from: "N5", to: "N7" }, { from: "N6", to: "N7" },
                    { from: "N7", to: "Target" }
                ],
                animationSteps: [
                    [{ from: "L1", to: "N1" }, { from: "L2", to: "N1" }, { from: "L3", to: "N2" }, { from: "L4", to: "N2" }, { from: "L5", to: "N3" }, { from: "L6", to: "N3" }, { from: "L7", to: "N4" }, { from: "L8", to: "N4" }],
                    [{ from: "N1", to: "N5" }, { from: "N2", to: "N5" }, { from: "N3", to: "N6" }, { from: "N4", to: "N6" }],
                    [{ from: "N5", to: "N7" }, { from: "N6", to: "N7" }],
                    [{ from: "N7", to: "Target" }]
                ]
            }
        ];

        const App = () => {
            const [levelIdx, setLevelIdx] = useState(0);
            const level = LEVELS[levelIdx];

            // Game Interactive States
            const [leaves, setLeaves] = useState(JSON.parse(JSON.stringify(level.leaves)));
            const [nests, setNests] = useState(JSON.parse(JSON.stringify(level.nests)));
            const [targetColor, setTargetColor] = useState('#CBD5E1'); // Empty grey initially
            const [changesCount, setChangesCount] = useState(0);
            
            // Animation States
            const [isAnimating, setIsAnimating] = useState(false);
            const [activeStep, setActiveStep] = useState(-1);
            const [crawlers, setCrawlers] = useState([]);
            
            // View Screens
            const [showIntro, setShowIntro] = useState(true);
            const [showSuccessModal, setShowSuccessModal] = useState(false);
            const [showFailureModal, setShowFailureModal] = useState(false);
            const [showHelpModal, setShowHelpModal] = useState(false);

            // Synchronize with Level Changes
            useEffect(() => {
                resetLevel();
            }, [levelIdx]);

            const resetLevel = () => {
                setLeaves(JSON.parse(JSON.stringify(level.leaves)));
                setNests(JSON.parse(JSON.stringify(level.nests)));
                setTargetColor('#CBD5E1');
                setChangesCount(0);
                setIsAnimating(false);
                setActiveStep(-1);
                setCrawlers([]);
                setShowSuccessModal(false);
                setShowFailureModal(false);
            };

            // Toggle Leaf Color with limit checking
            const handleLeafClick = (leafId) => {
                if (isAnimating) return;
                playSound('toggle');

                const updatedLeaves = leaves.map(leaf => {
                    if (leaf.id === leafId) {
                        const originalLeaf = level.leaves.find(l => l.id === leafId);
                        const isOriginallySame = leaf.color === originalLeaf.color;
                        
                        // Check if we are toggle-reversing back to original or making a new change
                        let newColor = leaf.color === 'purple' ? 'gold' : 'purple';
                        
                        // Recalculate total changes count
                        const potentialChanges = leaves.reduce((acc, curr) => {
                            if (curr.id === leafId) {
                                return acc + (newColor !== originalLeaf.color ? 1 : 0);
                            }
                            return acc + (curr.color !== level.leaves.find(l => l.id === curr.id).color ? 1 : 0);
                        }, 0);

                        if (potentialChanges > level.maxChanges) {
                            // Shake feedback or warning
                            return leaf;
                        }

                        setChangesCount(potentialChanges);
                        return { ...leaf, color: newColor };
                    }
                    return leaf;
                });

                setLeaves(updatedLeaves);
            };

            // Calculate evaluated colors level-by-level
            const evaluateLogic = () => {
                let currentStates = {
                    ...leaves.reduce((acc, curr) => ({ ...acc, [curr.id]: curr.color }), {}),
                    ...nests.reduce((acc, curr) => ({ ...acc, [curr.id]: curr.currentColor }), {})
                };

                const stepsResults = [];

                // For each step in the animation sequence, compute the results
                level.animationSteps.forEach((stepTransitions, stepIdx) => {
                    const stepEvaluations = {};
                    
                    // Group by target nest to process inputs
                    const nestInputs = {};
                    stepTransitions.forEach(t => {
                        if (!nestInputs[t.to]) nestInputs[t.to] = [];
                        nestInputs[t.to].push(currentStates[t.from]);
                    });

                    // For each target nest, evaluate rule
                    Object.keys(nestInputs).forEach(nestId => {
                        if (nestId === "Target") {
                            stepEvaluations[nestId] = nestInputs[nestId][0]; // Propagates directly
                        } else {
                            const nestObj = level.nests.find(n => n.id === nestId);
                            const inputs = nestInputs[nestId];
                            
                            // Rule: If two inputs are of the SAME color, the 3rd (output) becomes that color.
                            // Otherwise, it retains its initial/original color.
                            if (inputs.length === 2 && inputs[0] === inputs[1]) {
                                stepEvaluations[nestId] = inputs[0];
                            } else {
                                stepEvaluations[nestId] = nestObj.initialColor;
                            }
                        }
                    });

                    // Update currentStates for next step evaluation
                    currentStates = { ...currentStates, ...stepEvaluations };
                    stepsResults.push(stepEvaluations);
                });

                return stepsResults;
            };

            const runSimulation = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                playSound('slide');

                // Pre-evaluate entire logic flow
                const stepsResults = evaluateLogic();
                
                let currentStep = 0;
                setActiveStep(0);

                const executeStep = () => {
                    if (currentStep >= level.animationSteps.length) {
                        // Animation finished, evaluate win/loss
                        const finalColor = stepsResults[stepsResults.length - 1]["Target"];
                        setTargetColor(finalColor);
                        setIsAnimating(false);
                        
                        setTimeout(() => {
                            if (finalColor === level.target.color) {
                                playSound('success');
                                setShowSuccessModal(true);
                            } else {
                                playSound('fail');
                                setShowFailureModal(true);
                            }
                        }, 500);
                        return;
                    }

                    // Spawn Crawling Chameleons
                    const transitionsToAnimate = level.animationSteps[currentStep];
                    const activeCrawlers = transitionsToAnimate.map((t, idx) => {
                        const fromNode = [...leaves, ...nests].find(n => n.id === t.from);
                        // If it's the target node
                        const toNode = t.to === "Target" ? level.target : nests.find(n => n.id === t.to);
                        
                        // Get current color of source node
                        let colorOfCrawler = 'purple';
                        if (fromNode) {
                            colorOfCrawler = fromNode.color || fromNode.currentColor;
                        }

                        return {
                            id: `crawler-${idx}-${currentStep}`,
                            fromX: fromNode.x,
                            fromY: fromNode.y,
                            toX: toNode.x,
                            toY: toNode.y,
                            currentX: fromNode.x,
                            currentY: fromNode.y,
                            color: colorOfCrawler
                        };
                    });

                    setCrawlers(activeCrawlers);

                    // Crawl Animation Transition trigger
                    setTimeout(() => {
                        setCrawlers(prev => prev.map(c => ({ ...c, currentX: c.toX, currentY: c.toY })));
                    }, 50);

                    // Wait for crawl animation to finish
                    setTimeout(() => {
                        // Update Destination nest colors
                        const stepEval = stepsResults[currentStep];
                        setNests(prevNests => prevNests.map(n => {
                            if (stepEval[n.id] !== undefined) {
                                return { ...n, currentColor: stepEval[n.id] };
                            }
                            return n;
                        }));

                        // Reset crawlers for this step
                        setCrawlers([]);
                        
                        // Progress to next level-height step
                        currentStep++;
                        setActiveStep(currentStep);
                        
                        // Recurse next step
                        if (currentStep < level.animationSteps.length) {
                            playSound('slide');
                        }
                        setTimeout(executeStep, 400);

                    }, 950);
                };

                executeStep();
            };

            const getCoords = (nodeId) => {
                if (nodeId === "Target") return { x: level.target.x, y: level.target.y };
                const found = [...leaves, ...nests].find(n => n.id === nodeId);

                                        {/* Left gold half of circular "S" */}

                                                top: `${craw.currentY}%`, 
                                                transform: 'translate(-50%, -50%)',
                                            }}
                                            class="absolute z-30 crawler-transition"
                                        >
                                            <Chameleon color={craw.color} sizeClass="w-10 h-10" isFlipped={true} />
                                        </div>
                                    );
                                })}

                            </div>

                            {/* Info bar about teacher */}
                            <div class="mt-4 p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center text-xs md:text-sm">
                                <span class="text-slate-500 font-medium">🎯 حقق الهدف من خلال الاستدلال المنطقي ومطابقة الخصائص.</span>
                                <span class="text-sasetalPurple font-bold">بإشراف: المعلمة ناهد 🌸</span>
                            </div>

                        </section>
                    </main>

                    {/* Success Victory Modal */}
                    {showSuccessModal && (
                        <div class="fixed inset-0 bg-sasetalPurple-dark/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
                            <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center border-4 border-sasetalGold shadow-2xl relative float-animation">
                                <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 w-20 h-20 bg-sasetalGold rounded-full flex items-center justify-center text-4xl shadow-lg border-2 border-white">
                                    🏆
                                </div>

                                <h3 class="text-3xl font-extrabold text-sasetalPurple mt-6 mb-2">تهانينا! فوز رائع 🎉</h3>
                                <p class="text-sasetalGold-dark font-black mb-6">لقد نجحت في الحصول على الحرباء الذهبية بالأسفل!</p>
                                
                                <div class="bg-sasetalPurple-muted p-4 rounded-2xl border border-sasetalPurple/10 mb-6 text-sm text-slate-700 leading-relaxed">
                                    "بني الذكي/ابنتي الذكية، لقد أظهرت مهارات ممتازة في التفكير المنطقي وهندسة الخوارزميات. فخورون بك في معهد ساسيتال!"
                                    <br />
                                    <span class="font-extrabold text-sasetalPurple mt-2 block">المعلمة: ناهد</span>
                                </div>

                                <div class="flex gap-3">
                                    <button 
                                        onClick={() => { playSound('click'); resetLevel(); }}
                                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition-all duration-300 border border-slate-200"
                                    >
                                        إعادة اللعب 🔄
                                    </button>

                                    {levelIdx < LEVELS.length - 1 ? (
                                        <button 
                                            onClick={() => { playSound('click'); setLevelIdx(prev => prev + 1); }}
                                            class="flex-1 bg-gradient-to-r from-sasetalPurple to-sasetalPurple-light text-white font-extrabold py-3.5 rounded-xl shadow-md hover:scale-105 transition-all duration-300"
                                        >
                                            المستوى التالي ➡️
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={() => { playSound('click'); setShowIntro(true); }}
                                            class="flex-1 bg-gradient-to-r from-sasetalGold to-amber-500 text-sasetalPurple-dark font-extrabold py-3.5 rounded-xl shadow-md hover:scale-105 transition-all duration-300"
                                        >
                                            عودة للرئيسية 🏠
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Failure Try-Again Modal */}
                    {showFailureModal && (
                        <div class="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center border-4 border-red-500 shadow-2xl relative">
                                <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 w-20 h-20 bg-red-100 rounded-full flex items-center justify-center text-4xl shadow-lg border-2 border-white">
                                    🔍
                                </div>

                                <h3 class="text-2xl font-extrabold text-slate-800 mt-6 mb-2">محاولة جيدة، لكن لم ينجح الأمر!</h3>
                                <p class="text-red-500 font-bold mb-6">الحرباء بالأسفل تلونت باللون البنفسجي بدلاً من الذهبي.</p>
                                
                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6 text-sm text-slate-600 leading-relaxed text-right">
                                    <strong>💡 تلميحة المعلمة ناهد:</strong>
                                    <br />فكر بشكل عكسي! ليكون العش الأخير باللون الذهبي، ما هما اللونان اللذان يجب أن يخرجا من العشين السابقين له؟ حلل قاعدة الأعشاش وستصل للحل بكل سهولة!
                                </div>

                                <div class="flex gap-3">
                                    <button 
                                        onClick={() => { playSound('click'); resetLevel(); }}
                                        class="flex-1 bg-sasetalPurple text-white font-extrabold py-3.5 rounded-xl shadow-md hover:bg-sasetalPurple-dark transition-all duration-300"
                                    >
                                        إعادة المحاولة والتحليل 🔄
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer section matching the user's specific request */}
                    <footer class="bg-gradient-to-r from-sasetalPurple-dark to-sasetalPurple py-4 px-6 border-t-4 border-sasetalGold text-white text-center shadow-inner mt-8">
                        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
                            <div class="flex items-center gap-2">
                                <span class="text-sasetalGold text-lg">✨</span>
                                <span class="font-extrabold text-base tracking-wide">معهد ساسيتال التعليمي</span>
                                <span class="text-slate-300 text-xs hidden md:inline">|</span>
                                <span class="text-sasetalGold font-bold text-sm">بوابة التميز والإبداع المعرفي</span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-sasetalGold-muted bg-white/5 py-1.5 px-4 rounded-full border border-white/10">
                                <i class="fa-solid fa-graduation-cap"></i>
                                <span class="font-black text-sm text-sasetalGold">المعلمة المتميزة: ناهد</span>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        };

        // Render the application into root container
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
